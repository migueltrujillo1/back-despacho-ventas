apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas-backend
  namespace: ep3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas-backend
  template:
    metadata:
      labels:
        app: ventas-backend
    spec:
      containers:
        - name: ventas-backend
          image: 171210198405.dkr.ecr.us-east-1.amazonaws.com/ep3-ventas-backend:eks-v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: DB_ENDPOINT
              value: mysql-db
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: ventas_db
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
