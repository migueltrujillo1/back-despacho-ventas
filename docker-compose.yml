services:
  back-despacho:
    build:
      context: ./Springboot-API-REST-DESPACHO
    container_name: back-despacho
    restart: always
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_ENDPOINT: ${DB_ENDPOINT}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

  back-ventas:
    build:
      context: ./Springboot-API-REST
    container_name: back-ventas
    restart: always
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_ENDPOINT: ${DB_ENDPOINT}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}